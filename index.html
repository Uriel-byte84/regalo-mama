<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Feliz Cumpleaños, Mamá! 🎂</title>
    <style>
        :root {
            --color-principal: #d81b60;
            --color-secundario: #fce4ec;
            --color-texto: #37474f;
            --degradado-fondo: linear-gradient(135deg, #fce4ec 0%, #ffebee 100%);
            --fuente-titulos: 'Playfair Display', serif;
            --fuente-texto: 'Inter', sans-serif;
        }

        body {
            font-family: var(--fuente-texto);
            color: var(--color-texto);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: var(--degradado-fondo);
        }

        /* Pantalla de Inicio */
        #pantalla-inicio {
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #fdfbf7;
            z-index: 100;
            position: relative;
        }

        .btn-abrir {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: var(--color-principal);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        /* Contenido del Libro */
        #contenido-libro {
            display: none;
            padding: 50px 20px;
            flex-direction: column;
            align-items: center;
        }

        .main-container {
            width: 90%;
            max-width: 900px;
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
            padding: 50px;
            box-sizing: border-box;
        }

        /* Estilos originales */
        h1 {
            font-family: var(--fuente-titulos);
            font-size: 3rem;
            color: var(--color-principal);
            text-align: center;
            margin-top: 0;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 50px auto;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            background-color: #fdfbf7;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            height: 400px;
        }

        .carousel-slide {
            min-width: 100%;
            height: 100%;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .carousel-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(216, 27, 96, 0.85);
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
        }

        .prev {
            left: 10px;
        }

        .next {
            right: 10px;
        }

        .time-section {
            display: flex;
            justify-content: space-around;
            padding: 30px;
            background-color: #fafafa;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .btn-modern {
            display: block;
            margin: 0 auto;
            padding: 15px 35px;
            color: white;
            background-color: var(--color-principal);
            border: none;
            border-radius: 50px;
            cursor: pointer;
        }

        #final-message {
            display: none;
            text-align: center;
            margin-top: 20px;
            padding: 20px;
            font-size: 1.3rem;
        }

        #final-message.visible {
            display: block;
        }
    </style>
</head>

<body>

    <div id="pantalla-inicio">
        <h1>Para Mamá</h1>
        <button class="btn-abrir" onclick="entrarAlLibro()">ABRIR LIBRO</button>
    </div>

    <div id="contenido-libro">
        <div class="main-container">
            <h1>¡Feliz cumpleaños, mamá!</h1>
            <div class="carousel-container">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-slide"><img src="1.jpg" alt="Foto 1"></div>
                    <div class="carousel-slide"><img src="2.jpg" alt="Foto 2"></div>
                    <div class="carousel-slide"><img src="3.jpg" alt="Foto 3"></div>
                    <div class="carousel-slide"><img src="4.jpg" alt="Foto 4"></div>
                    <div class="carousel-slide"><img src="5.jpg" alt="Foto 5"></div>
                    <div class="carousel-slide"><img src="6.jpg" alt="Foto 6"></div>
                    <div class="carousel-slide"><img src="7.jpg" alt="Foto 7"></div>
                    <div class="carousel-slide"><img src="8.jpg" alt="Foto 8"></div>
                    <div class="carousel-slide"><img src="9.jpg" alt="Foto 9"></div>
                    <div class="carousel-slide"><img src="10.jpg" alt="Foto 10"></div>
                    <div class="carousel-slide"><img src="11.jpg" alt="Foto 11"></div>
                    <div class="carousel-slide"><img src="12.jpg" alt="Foto 12"></div>
                </div>
                <button class="carousel-btn prev" id="prevBtn">&#10094;</button>
                <button class="carousel-btn next" id="nextBtn">&#10095;</button>
            </div>

            <div class="time-section">
                <div class="time-item">
                    <div class="time-label">Mamá</div>
                </div>
                <div class="time-item">
                    <div class="time-label">Tú</div>
                    <div id="edadMia"></div>
                </div>
                <div class="time-item">
                    <div class="time-label">H. Mediana</div>
                    <div id="edadMedio"></div>
                </div>
                <div class="time-item">
                    <div class="time-label">H. Menor</div>
                    <div id="edadMenor"></div>
                </div>
            </div>

            <button class="btn-modern" id="toggleButton">Toca aquí para tu sorpresa ✨</button>
            <div id="final-message">Gracias por ser nuestra guía y la mejor mamá del mundo. ❤️</div>
        </div>
    </div>

    <script>
        function entrarAlLibro() {
            document.getElementById('pantalla-inicio').style.display = 'none';
            document.getElementById('contenido-libro').style.display = 'flex';
        }

        let slideIndex = 0;
        const track = document.getElementById('carouselTrack');
        const slides = document.querySelectorAll('.carousel-slide');

        function moverCarrusel(step) {
            slideIndex = (slideIndex + step + slides.length) % slides.length;
            track.style.transform = `translateX(-${slideIndex * 100}%)`;
        }

        document.getElementById('prevBtn').addEventListener('click', () => moverCarrusel(-1));
        document.getElementById('nextBtn').addEventListener('click', () => moverCarrusel(1));

        function calculateAge(birthDateString) {
            const today = new Date();
            const birthDate = new Date(birthDateString + "T00:00:00");
            let age = today.getFullYear() - birthDate.getFullYear();
            if (today.getMonth() < birthDate.getMonth() || (today.getMonth() === birthDate.getMonth() && today.getDate() < birthDate.getDate())) age--;
            return `${age} años`;
        }

        document.getElementById('edadMia').innerText = calculateAge('2000-03-12');
        document.getElementById('edadMedio').innerText = calculateAge('2008-04-16');
        document.getElementById('edadMenor').innerText = calculateAge('2021-11-21');

        document.getElementById('toggleButton').addEventListener('click', (e) => {
            document.getElementById('final-message').classList.add('visible');
            e.target.style.display = 'none';
        });
    </script>
</body>

</html>
